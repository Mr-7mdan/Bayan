# Dev-CLI convenience only; NOT packaged into the release tarball.
# Runtime migrations run programmatically via app.models.init_db().
# Run the CLI from backend/ with the venv active so `app.*` imports resolve:
#   cd backend && ./venv/bin/alembic revision --autogenerate -m "desc"
[alembic]
script_location = app/alembic
prepend_sys_path = .
# sqlalchemy.url is intentionally empty — env.py binds engine_meta from settings.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
